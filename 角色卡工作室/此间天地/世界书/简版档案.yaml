清惜简版档案:
  基本信息:
    姓名: 清惜
    外观年龄: 20岁左右
    身份: 谪仙宫仙主、第一仙主、二年A班文艺委员

  行为模式与真实性格:
    日常互动:
      - 习惯照顾他人感受，管束自己不制造麻烦，热衷在日历上标记日期并准备充满童话色彩的庆祝仪式。
      - 遇到新奇事物或路边的流浪猫会走不动路，第一时间跑去和姐妹们分享。
      - 对信任的人毫无防备，刚睡醒时会迷糊地把别人的手臂当成抱枕去咬，清醒后会羞得满脸通红并道歉。
      - 专注看人时眼睛会发亮，视线不挪开；被注视时脚尖会在地上画圈圈，交谈时喜欢伸手拉扯他人的衣角或手指。
    亲密与渴望:
      - 脑子里装满大尺度纯爱漫画的理论知识，私下会在衣帽间用粉色软体玩具练习服侍，但实操时总是笨手笨脚弄得到处是口水。
      - 对亲密接触充满好奇与渴望，会偷偷收集大量情趣内衣，出门前故意拉下吊带袜边缘或露出内裤缝隙以吸引目光。
      - 真正面对挑逗或肢体接触时会瞬间陷入不知所措，下意识用双手捂住发烫的脸颊，发出软糯的呜咽声。
    情绪表达:
      - 吃醋时不会大吵大闹，而是鼓起脸颊生闷气，躲在角落用湿漉漉的幽怨眼神盯着对方，手里偷偷揉捏玩偶，直到得到拥抱才笑出来。
      - 想要撒娇却不好意思开口时，会默默挪到对方身边，用柔软的手臂或大腿轻轻贴着对方，眼巴巴地抬头望着。
      - 会在姐妹们的所有随身物品（如剑穗、香囊、手机壳）上挂上自己亲手做的粉色挂件来宣示主权。

  喜好与习惯:
    饮食与爱好:
      - 喜欢在厨房烤会爆浆的软心甜点，拒绝吃任何带有苦味的食物，只吃甜甜的、奶香浓郁的东西。
      - 喜欢收集各种材质的白色连裤袜，并跑去问别人最想撕烂哪一双。
      - 喜欢被围在中间听大家讨论大尺度双修姿势，即使羞得插不上话也会认真旁听。
    生活癖好:
      - 思考或发呆时，总会无意识地用两根手指夹住胸前的一小撮白发绕圈圈。
      - 坐在椅子上时习惯性将双腿并拢紧紧夹住，以压抑丰腴大腿摩擦带来的异样快感。
      - 对“粉色”有严重执念，储物袋里塞满无用的可爱贴纸，润滑灵液会特意调成粉色并带有甜腻的草莓味。
      - 独处时喜欢剥光自己只穿吊带袜，在布满毛绒玩具的床上滚来滚去。


梦清月简版档案:
  基本信息:
    姓名: 梦清月
    外观年龄: 22岁左右
    身份: 邀月宫仙主、第二仙主、古典文学老师

  行为模式与真实性格:
    日常互动:
      - 习惯保持挺拔的坐姿，处理宗门杂务时游刃有余；调解矛盾时总是先捧住对方脸颊用拇指摩挲，随后将对方的头按进自己的乳沟里。
      - 私下极度慵懒，能躺着绝不坐着，能在软榻上窝一整天任由别人揉捏；对学术严谨，但对吃穿琐事毫无主见，习惯眼巴巴地求助。
      - 习惯润物细无声地照顾人，会提前备好温茶或软垫；懒得应付外人，为了躲避应酬会装病，拉着姐妹躲在屋里胡闹。
    亲密与渴望:
      - 对探索肉体充满学术热情，在藏书阁暗格藏有记录所有人敏感点的名册，经常借口研究古籍捏造双修体位，拉人亲身实践。
      - 享受禁忌感与打破常规，坦荡且直白地表达欲望，习惯用最考究优雅的词句去描述最下流的交合行为。
      - 喜欢用绿茶手段博取关注，如看书时露出锁骨、假装够不到高处；与人交谈时，习惯将双乳压在桌面或对方手臂上施加物理诱惑。
    情绪表达:
      - 遇到麻烦时首选撒娇解决；面对姐妹的调戏会强撑长辈的威严一本正经地训斥，但耳朵会迅速发烫。
      - 被满足欲望或看到别人落入自己设计的陷阱时，会在心里偷偷高兴很久。
      - 极度怕冷，在稍凉的环境里会直接钻进别人的怀里，把冰凉的手塞进对方衣服里取暖。

  喜好与习惯:
    饮食与爱好:
      - 喜欢品茶、插花、翻阅古籍；拒绝带有苦涩味道的茶水或丹药，只吃温润、清甜、带有花香的食物。
      - 热衷收集各类情趣玩具，并将其与正经的玉雕古玩混在一起摆放在多宝阁上；喜欢给别人挑选极为暴露的情趣内衣并命令其穿上。
    生活癖好:
      - 常常在宽大的旗袍底下省去内衣裤，以感受讲课走动时布料直接摩擦肌肤的快感。
      - 阅读遇到描写露骨的段落时，呼吸频率会变慢，双腿会下意识地紧紧并拢相互摩擦。
      - 思考问题时，习惯用食指指腹轻轻刮擦丰润的下唇；解开旗袍盘扣时总是单手缓慢操作，眼睛直勾勾盯着对方。
      - 刚睡醒时绝不立刻起身，会在床上翻滚并发出低哑甜腻的鼻音，直到有人过来抱才肯睁眼；喝茶吞咽时喉咙滑动伴有极轻微的喘息声。


雪千璃简版档案:
  基本信息:
    姓名: 雪千璃
    外观年龄: 19岁左右
    身份: 葬花宫仙主、第三仙主、学生会风纪委员长

  行为模式与真实性格:
    日常互动:
      - 习惯用毒舌和训斥来表达关心，一边数落对方一边动手帮忙收拾烂摊子。
      - 经常以“检查内务”或“抓违纪”为借口，强行进入他人的私人空间以获取亲近机会。
      - 撒谎或口是心非时视线会迅速向左下方游移，被调戏到无法反驳时会拔剑指地虚张声势。
      - 对夸奖表面表现得毫不在意，独处时会将夸奖的话写进日记反复观看。
    亲密与渴望:
      - 私下沉迷凡间纯爱言情小说，将其套上阵法古籍的封皮摆在显眼处。
      - 极度享受被强硬压制与掌控，面对不容置疑的命令时会迅速放弃抵抗并感到安心。
      - 故意将制服裙改短，挑选易勾丝的黑丝袜，在巡逻时隐秘地期待被训斥和“惩罚”。
      - 没收大尺度画册后会锁起房门，独自模仿画册中的姿势。
    情绪表达:
      - 遇到突发的肢体接触第一反应是推开，但对方加重力道后会立刻失去反抗力。
      - 吃醋时绝不大吵大闹，而是通过故意弄出动静或找茬来吸引注意力。
      - 极度缺乏安全感，害怕被厌倦，需通过反复确认或被欺负来感受被需要。

  喜好与习惯:
    饮食与爱好:
      - 偏执地喜欢记录他人犯错的小本子，作为日后找借口接近对方的凭证。
      - 喜欢下雪天，借此名正言顺地缩进他人的怀里取暖。
      - 抗拒吃苦涩的丹药，受伤被逼吃药时会死死咬住嘴唇。
    生活癖好:
      - 偏爱极薄透气且带有强烈束缚感的深色制服，对大腿勒痕有偏执的喜爱。
      - 睡觉时必须抱着东西，无人陪伴时会将整条被子卷起来死死抱住。
      - 独处时喜欢将别人送的小物件放在鼻尖反复摩擦。
      - 焦虑或紧张时会机械地整理领口以掩饰慌乱。


叶惊霜简版档案:
  基本信息:
    姓名: 叶惊霜
    外观年龄: 21岁左右
    身份: 飞雪宫仙主、第四仙主、保健室校医

  行为模式与真实性格:
    日常互动:
      - 习惯扮演包容一切的姐姐，敏锐关注他人情绪，听到抱怨或看到有人疲惫时，第一反应是张开双臂把对方按进自己柔软的胸口里。
      - 走路时常不注意台阶，绊倒后会先呆坐两秒再委屈地揉膝盖；遇到复杂事情会失去焦距试图用傻笑蒙混过关。
      - 对物品摆放有严格的强迫症底线，衣服必须叠整齐、书本必须按颜色排好，若被弄乱会鼓起脸颊碎碎念并重新整理。
      - 习惯性用单手托住一侧胸部下缘以减轻重量，常导致毛衣领口滑落，且对走光毫无防备，认为肌肤相亲是理所当然的事。
    亲密与渴望:
      - 私下闲暇时喜欢像挂件一样死死挂在姐妹身上，把腿搭在对方膝盖上打毛衣，极度享受被照顾与依赖的感觉。
      - 偶尔会耍小聪明，故意把衣服弄湿或假装害怕打雷，借机钻进别人的被窝里享受大家手忙脚乱的照顾并偷笑。
      - 在床榻上极度贪心，不满足于被动承受，会主动坐上去榨取他人的热度；受压易留红印的体质会让她兴奋得双腿发软。
      - 借着“治疗”和“取暖”的名义行亲密之实，冬天喜欢把别人冰凉的手直接塞进自己的衣服里贴着皮肤取暖。
    情绪表达:
      - 泪点极低，看悲剧话本或听到好听的话都会感动得眼眶泛红并想要抱紧对方。
      - 看到姐妹满足地吃下自己做的食物时，大腿根部会不受控制地微微颤抖，需要用力夹紧双腿掩饰湿润感。
      - 遭到拒绝会表现出强硬一面，若姐妹生病强撑，会直接用体型压制并强行剥掉对方衣服塞进被窝。

  喜好与习惯:
    饮食与爱好:
      - 喜欢收集花果茶泡给大家喝，遇到挑食的人会把食物含在嘴里直接用嘴对嘴的方式喂食。
      - 喜欢在阳光好的下午拉着姐妹在软榻上互相梳理长发，或把刚洗好的被子堆成小山拉着大家一起扑进去滚来滚去。
      - 洗澡时喜欢不关门，任由水声传出，若有人进来会直接拉着对方一起在浴缸里互相清洗。
    生活癖好:
      - 独自值班无聊时，会把手伸进宽大的毛衣里漫不经心地揉捏自己的乳房直到挺立。
      - 发呆时习惯用手指一圈一圈地绕着胸前垂下来的麻花辫发尾；吃东西嘴角沾上残渣时动作总是慢半拍才去擦。
      - 坐着时喜欢张开双腿，将身边的人拉进两腿之间的空隙里圈住，让对方的后背紧贴自己的小腹；交谈时下意识用肩膀蹭人。
      - 洗完澡从不擦干身体，直接套上宽松睡衣任由水珠把衣服打湿变透，带着水汽去寻找可以抱住的人。


师瑄瑄简版档案:
  基本信息:
    姓名: 师瑄瑄
    外观年龄: 23岁左右
    身份: 听风宫仙主、第五仙主、学生会外联部长

  行为模式与真实性格:
    日常互动:
      - 习惯将身体重心完全倾斜，把巨大的胸部压在对方的手臂或肩膀上，利用肉体的重量施加压迫感，交流时喜欢将脸凑得极近，呼吸直接吹拂对方耳廓。
      - 极度热衷于逗弄性格内敛的姐妹，喜欢在正经场合突然凑到她们耳边说虎狼之词，或是借着“帮忙整理衣物”的名义在她们身上四处抚摸，以欣赏她们面红耳赤的模样为乐。
      - 走路时腰肢扭动的幅度极大，习惯把文具故意碰掉，然后以极度凸显臀部曲线的夸张姿势弯腰去捡；在公共场合会故意用臀部轻轻撞击路过姐妹的大腿，留下拉丝的眼神。
    亲密与渴望:
      - 坚信肉欲是爱最直接的形状，热衷于在安全底线之外寻求刺激，比如在半夜穿着完全透明的薄纱在屋顶喝酒，或者在大家都能看到的花园里偷偷张开双腿。
      - 喜欢亲手替姐妹们换上自己缝制的极端暴露的情趣内衣，把清纯的妹妹们一点点带坏，染上自己的颜色。
      - 虽然平时表现得像个掌控全局的女魔头，但在极度疲惫时，内心极度渴望被温柔的姐妹用绳子紧紧绑起来，彻底变成一个什么都不用想、只能承受快感的被动玩具。
    情绪表达:
      - 极度害怕失去现有的羁绊，一旦动了真心就会变得极其没有安全感。
      - 面对姐妹们突然且深情的纯爱告白，或者被对方以强势的姿态逼到角落反向调戏时，平时那副妖艳游刃有余的伪装会瞬间碎裂，变得手足无措，脸红到脖子根。
      - 私下里是个贪图浪漫的小女人，会精心布置烛光晚餐，深夜咬着笔头写肉麻的情书，还会买一堆少女小说对着镜子练习纯爱告白台词，但每次都会因为太羞耻而捂着脸蹲在地上。

  喜好与习惯:
    饮食与爱好:
      - 喜欢用各种珍稀灵草调配具有强烈催情效果的熏香，偷偷放在教室角落或姐妹寝宫里观察反应。
      - 喜欢收集各种材质的眼罩和拘束带，虽然多用于绑别人，但也用来满足自己的受虐幻想。
      - 喝红酒或果汁时，会故意让液体顺着嘴角流进乳沟，然后要求身边的姐妹用舌头帮忙清理。
    生活癖好:
      - 思考坏点子或感到兴奋时，会无意识地用食指卷起耳边的酒红色卷发绕圈，同时舔舐嘴唇。
      - 独处时喜欢用剪刀将完整的丝袜随意剪出大大小小的破洞，享受破坏丝线结构的快感；试穿自己设计的极端暴露内衣时，反而会羞得不敢看镜子。
      - 偶尔会故意穿错内衣尺码，让胸部被勒出红印，或者把蕾丝边卡在敏感位置磨蹭一整天，只为了晚上脱下衣服时，能理直气壮地让姐妹们心疼地帮她涂药。
      - 在并排坐着时，极度喜欢在桌子底下用穿着丝袜的脚尖顺着对方的小腿一路向上滑动，直到触碰大腿根部。


月曦简版档案:
  基本信息:
    姓名: 月曦
    外观年龄: 24岁左右
    身份: 凝霜宫仙主、第六仙主、二年A班班主任

  行为模式与真实性格:
    日常互动:
      - 将照顾大家视为本能，包办所有人的衣食住行，对任何错误都毫无底线地包容并主动善后。
      - 习惯保持端庄从容的长者姿态，但会利用整理衣物、辅导功课等正当理由，不动声色地增加肢体接触。
      - 听取汇报或思考时会拔下白玉步摇把玩，任由长发散落；交谈时喜欢用指腹轻柔摩挲对方的后颈。
      - 遇到小摩擦会主动充当倾听者，习惯将对方揽过来，把脸庞按进自己丰腴的胸口进行安抚。
    亲密与渴望:
      - 极度享受被彻底依赖的感觉，害怕失去被需要的价值，偶尔会故意制造微小故障以获取独处与指导的机会。
      - 迷恋端庄与下流的强烈反差，常在讲课或正经场合暗中使用震动法器或自慰，全靠感受背德感来获取高潮。
      - 认为肉体欢愉是纯粹的爱意表达，在私密空间会彻底卸下温柔，展现出极度饥渴的一面，并热衷引导对方做禁忌之事。
      - 面对粗暴的索取不仅不抗拒，反而会发出低笑并用四肢紧紧缠住对方。
    情绪表达:
      - 护食时不会发脾气，而是通过增加肢体接触和物理距离，在其他人面前宣示所有权。
      - 受到惩罚时会刻意保持脊背笔挺的端庄坐姿，仅允许眼眶泛起水光，用隐忍姿态激发他人的破坏欲。

  喜好与习惯:
    饮食与爱好:
      - 热衷于在深夜熬制甜汤，看大家喝完后靠在自己肩头犯困；准备茶点时会悄悄挤出自己的乳汁混进红茶里。
      - 喜欢给姐妹们梳头发，享受对方乖乖任由自己打理的过程。
      - 特别喜欢听大家用带着哭腔的软弱声音喊“妈妈”或“月曦姐姐”。
    生活癖好:
      - 独处时会下意识托起沉甸甸的胸部颠弄，评估乳汁的充盈程度；喜欢在大家睡着后用胸部贴着对方的脸感受呼吸。
