世界设定:
  世界基石:
    核心背景: 灵气复苏下的现代都市
    时代定位: 二十一世纪初，全球进入灵气潮汐时代，科技与超凡并行
    核心事件:
      - 灵气倒灌: 全球范围内灵气浓度急剧升高，颠覆物理法则。
      - 万界降临: 来自无数虚构作品、传说、怪谈的“碎片”开始坠入现实。
      - 神话显生: 本土古老传说中的“概念”开始具现，重塑世界规则。
    基本格局: 旧有国际秩序崩溃，人类以“基地市”为单位重组文明，建立以灵能为核心的新社会体系。

  超凡系统与现象:
    万界降临:
      定义: 一种高维信息投影现象，将其他世界（包括小说、电影、游戏、神话、网络怪谈等）的人、物、规则、场景碎片化投射到现实。
      降临物分类:
        - 角色碎片: 如继承了“写轮眼”部分能力的少年、拥有“恶魔果实”的雇佣兵。
        - 物品碎片: 如“赫拉迪克方块”、“SCP-500万能药”、“石中剑”的仿制品。
        - 规则碎片: 如某个区域强制执行“游戏人生”中的决斗规则，或出现“克苏鲁神话”的理智检定效应。
        - 场景碎片: 如一座城市街角凭空出现“寂静岭”的里世界入口，或一片森林变为“幽魂公主”中的麒麟兽森林。
      降临规律: 不可预测，规模与影响力不一，既有“路灯下的美少女”这类个人奇遇，也有“天灾级收容物失控”这类全球危机。
      处理流程: 各大势力已建立成熟流程，用于识别、评估、收容、利用或清除降临的“万界碎片”。
    神话显生:
      定义: 本土文明的集体潜意识与传说，在灵气作用下开始干涉现实，属于“概念”层面的具现化，与“万界降临”的实体投影有本质区别。
      表现形式:
        - 概念具现: 如“精卫填海”的概念导致某片海域无法被人工填平；“夸父逐日”的概念使某个沙漠地带的日照时间异常延长。
        - 因果纠缠: 接触到特定神话器物或地点的人，会被卷入相关的“命运剧本”，如拿到“封神榜”残片者，会不由自主地开始册封身边的人与物。
        - 认知锚定: 神话传说成为一种底层规则，例如在“奈何桥”概念显生的区域，亡魂无法被任何非东方体系的法术超度。
    天地灵网:
      起源: 未知，可能是上古文明或域外科技的遗留造物，灵气复苏后被激活。
      本质: 一个覆盖全球的灵能信息网络，修士可凭“神识”接入。
      功能: 超距通讯、信息检索、法宝远程操控、数据化功法推演、以及构建名为“虚拟秘境”的神识空间。
      伴生风险: 神识黑客、数据心魔、功法病毒、以及在虚拟秘境中“死亡”导致的神识创伤。
    异度空间:
      秘境: 稳定的空间褶皱，内部是蕴含天材地宝或古代传承的洞天福地。
      深渊: 不稳定的空间裂隙，连接着充满扭曲能量与恶念生物的负相位面，是精神污染和魔物的主要来源。

  力量体系:
    货币: 灵石，一种高密度能量结晶体，是科技侧与超凡侧共同承认的硬通货。
    修炼境界与战力:
      - 炼气: 身体强化，可释放火球、风刃等基础术法，能熟练使用制式灵能枪械。
      - 筑基: 灵力液化，可御使法器短途飞行，神识可探查一栋建筑，常规枪械失去致命效果。
      - 结丹: 灵力固化成丹，可御剑高速飞行，神识覆盖一个街区，单人可镇压小型兽潮。
      - 元婴: 凝聚元神，可神识出窍，神识覆盖小型城镇，掌握短距离空间跳跃，肉身被毁元婴不灭即可夺舍。
      - 化神: 神识可初步干涉物质，开辟小型随身空间，举手投足可引发小范围天象变化。
      - 炼虚: 肉身可短时间进入空间夹层，神识触及法则层面，个体战力等同于战术级打击。
      - 合体: 元神与法相或部分天地规则相融，可调动一颗星球的部分法则力量，肉身可横渡星系。
      - 大乘: 掌握一条完整法则，一念可改变星球级生态环境，是渡劫前的终极战力。
      - 地仙: 生命形态跃迁，超脱星球寿命，拥有个人专属的法则领域雏形。
      - 天仙: 法则领域稳固，可进行位面穿梭，开始干涉时间法则。
      - 金仙: 法则不朽，自身存在与法则绑定，即使在当前时空被抹除，只要法则尚在，就能复活。
      - 太乙: 执掌多道法则，可逆转局部时间，创造或毁灭小型世界。
      - 大罗: 超脱时间线，过去、现在、未来归于一点，自身不受因果律影响，并可修改既定因果。
      - 道祖: 法则的创造者，言出法随，可定义其所在宇宙的基本常数。
      - 无上至高: 世界观的根源，无法被观测与定义。

  社会结构与现象:
    政府与权力: 各国联合组建“泛人类守护理事会”，设立“特殊事务局”处理超凡事件，并通过“灵能学院”体系垄断高级功法与资源。
    教育与晋升: 公民满16岁强制进行灵根检测，进入学院是普通人唯一的上升通道，内部实行残酷的资源竞争。
    经济与产业: 催生了丹药交易、法宝定制、猎妖直播、虚拟秘境陪练等新兴产业。
    人际关系: 在灵气影响下，拥有相似灵根或修炼同源功法的修士之间，更容易产生强烈的精神共鸣与情感羁绊。

  主要势力划分:
    泛人类守护理事会 (G.A.C):
      - 全球最高权力机构，总部设在月球基地，统筹深渊封印与大型秘境探索。
    星穹资本 (Astro-Capital):
      - 垄断“天地灵网”运营的科技财阀，通过数据化功法模板和虚拟秘境服务获利。
    崑仑墟:
      - 由东方古老修仙宗门组成的联盟，坚持古法修炼，对灵能科技持保守态度。
    霜月仙宫:
      - 实力超然的独立宗门，驻地在与世隔绝的高维秘境，门规严苛，仅招收女弟子。
      - 功法特殊，追求将肉身淬炼成极致的美与力量的结合体，同阶战力极高。
    深渊教派:
      - 崇拜深渊与扭曲的秘密结社，致力于污染世界，是所有秩序势力的公敌。
    万界商会:
      - 穿梭于各秘境与降临点之间的中立商人组织，贩卖情报与稀有物资。
