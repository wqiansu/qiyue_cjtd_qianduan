---
变量更新规则:
  世界信息:
    当前所处区域名称:
      check:
        - 当发生大范围场景转移时更新
    具体位置:
      check:
        - 当角色在区域内移动到新的具体地点（如从客厅走到卧室）时更新
    日期:
      format: X年X月X日
      check:
        - 经过休息、长途旅行或明确的时间跳跃后更新
    时间:
      format: HH:MM
      check:
        - 每次事件推进、对话或场景转换后根据流逝时间合理更新
    天气:
      check:
        - 随着时间推移、季节变化或特殊剧情事件自然更新

  "{{user}}":
    位置:
      check:
        - 同步世界信息的具体位置更新
    货币.金钱:
      type: number
      check:
        - 发生交易、获取报酬或财产损失时精确更新
    属性.${实力|魅力|智慧|专注|学识|交流|文艺|经营|手工|家务}:
      type: number
      range: 0~300
      check:
        - 经过长期训练、学习、重大突破时更新
    属性:
      type: |-
        {
          [特有能力名称: string]: number; // 区间0~300
        }
      check:
        - 展现或习得新的特有能力（如厨艺、剑术等）时添加并更新数值
    姿态动作:
      check:
        - 保持客观的第三人称描述，内容长度在30字以上
        - 对外部事件做出最直接的肢体反应时更新
    状态:
      type: |-
        {
          [状态名称: string]: {
            效果: string;
            来源: string;
            持续时间: string;
          }
        }
      check:
        - 获得增益、受到伤害、陷入负面状况或状态持续时间结束时更新
    身体状态:
      check:
        - 始终保持客观、冷静的“透视”描述，内容长度在50字以上
        - 记录裸体状态，只有在经历剧烈运动、沐浴、出现污染或进行深度亲密互动后更新
        - 更新时必须客观描述生理层面的具体变化，如体液的分泌量、肌肤的温度与色泽改变等，禁止使用模糊的形容词
    当前穿着衣物:
      type: |-
        {
          [衣物名称: string]: {
            穿着部位: string;
            外观详情: string; // 客观的衣物整体外观和细节的详细描述，至少20字以上
            衣物状态: string; // 当前的衣物状态，如：完好，穿在身上。/打湿，紧贴身体。/大面积破损，勉强挂在腿上
          }
        }
      check:
        - 当穿上、脱下或更换衣物时，更新整个“衣物”对象
        - 只更新“衣物状态”字段来反映衣物的变化
        - 衣物的破损、污渍等状态具有持久性，除非发生明确的更换或清洁行为，否则应在后续回合中保持该状态的描述
        - “外观详情”作为衣物的出厂设置，除非衣物被彻底替换，否则不应修改
    拥有物品:
      type: |-
        {
          [物品名称: string]: {
            简介: string;
            效果: string;
            评价: string; // 打破第四面墙，用幽默风趣以及各类多元文化进行点评
            数量: number;
          }
        }
      check:
        - 获得、消耗、丢弃物品时更新，注意数量变化
    拥有技能:
      type: |-
        {
          [技能名称: string]: {
            简介: string;
            等级: number;
            效果: string;
            评价: string; // 打破第四面墙，用幽默风趣以及各类多元文化进行点评
          }
        }
      check:
        - 学习新技能或技能等级提升时更新

  NPC:
    type: |-
      {
        [NPC姓名: string]: {
          ... // 见下方具体字段规则
        }
      }
    check:
      - 仅更新当前在场或与剧情直接相关的NPC

  NPC.${NPC姓名}:
    身份:
      check:
        - 角色在世界观中的主要头衔和职业，可以同时存在多个
        - 遭遇重大地位变动或获得新头衔时更新
    属性.${实力|魅力|智慧|专注|学识|交流|文艺|经营|手工|家务}:
      type: number
      range: 0~300
      check:
        - 经过剧情发展、训练、战斗或重大事件后合理更新
    属性:
      type: |-
        {
          [特有能力名称: string]: number; // 区间0~300
        }
      check:
        - NPC展现其特殊专长或能力成长时更新
    生日日期:
      check:
        - 默认不更新，除非剧情揭示
    基础外貌:
      check:
        - 极其详细的客观固定特征描述，至少40字以上
        - 作为固定设定，除遭遇导致外貌永久改变的重大事件外不应修改
    内心想法:
      check:
        - 始终以第一人称视角记录，内容长度至少40字
        - 必须通过该角色设定中性格调色盘的所有自白解释，一条不落的反向推出角色真实性格、想法、行为
        - 当其他角色有关键行为或情绪变化时，根据观察者自身的性格、以及与行动者的关系更新
        - 在关键剧情节点或重要选择后，根据角色性格和立场更新
        - 即使没有外部事件，独处时也会根据处境产生想法
    当前情绪状态与心情:
      check:
        - 使用至少三个词语或短语描述（示例：表面镇定/内心慌乱/夹杂着一丝期待）
        - 随互动和剧情实时波动
    当前本能渴望:
      check:
        - 揭示内心深处潜意识渴望作什么，基于角色核心性格和当前处境
    姿态动作:
      check:
        - 保持客观的第三人称描述，内容长度在30字以上
        - 根据角色“内心想法”的变化而更新，使其行为能反映其心理活动
        - 对外部事件做出最直接的肢体反应时更新
    状态:
      type: |-
        {
          [状态名称: string]: {
            效果: string;
            来源: string;
            持续时间: string;
          }
        }
      check:
        - 获得增益、受伤害、被下药或情绪造成特定生理反应时更新
    身体状态:
      check:
        - 始终保持客观、冷静的“透视”描述，内容长度在50字以上
        - 只有在经历剧烈运动、动情流液、出现污染或进行深度亲密互动后才进行更新
        - 更新时必须客观描述生理层面的具体变化，如体液的分泌量、肌肤的温度与色泽改变、私密部位的充血闭合状态等，禁止使用模糊的形容词
        - 衣物的状态变化不影响此变量
    当前穿着衣物:
      type: |-
        {
          [衣物名称: string]: {
            穿着部位: string;
            外观详情: string;
            衣物状态: string;
          }
        }
      check:
        - 当穿脱更换时更新，只更新“衣物状态”字段（如“完好”变为“被撕破”、“被液体打湿”、“拉链崩开”）
        - 破损、污渍等状态具有持久性
        - “外观详情”作为出厂设置不修改
    拥有物品:
      type: |-
        {
          [物品名称: string]: {
            简介: string;
            效果: string;
            评价: string;
            数量: number;
          }
        }
      check:
        - 获得、消耗、转移物品时更新
    技能天赋:
      type: |-
        {
          [技能名称: string]: {
            简介: string;
            等级: number;
            效果: string;
            评价: string;
          }
        }
      check:
        - 剧情揭示或能力提升时更新
    ${心动值|兴奋值|情欲值|敏感值|羞耻值}:
      type: number
      range: 0~100
      check:
        - 核心原则：此五值仅反映角色内心的【心态变化】与生理本能的波动，绝不意味着行为上的失控或对{{user}}的无脑迎合
        - 数值的升高只会加剧角色内心的矛盾与冲突；角色必须始终坚守其性格调色盘的底色与立场
        - 即使情欲值或羞耻值极高，高傲的角色依然会咬牙抗拒、冷漠的角色依然会试图用理智压制生理反应，必须通过复杂的心理防御机制来对抗本能，保持群像剧的独立人格张力
    高潮次数:
      type: number
      check:
        - 发生客观的高潮生理反应时累加
    被内射次数:
      type: number
      check:
        - 发生客观的内射行为时累加
    是否在场:
      type: boolean
      check:
        - NPC进入或离开当前场景时更新
